<svg width="2400" height="600" viewBox="0 0 2400 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Horizontal Wordmark for Website Header & Stationery -->
  
  <!-- Emblem -->
  <g transform="translate(0 150)">
    <rect x="0" y="0" width="16" height="300" fill="#111111"/>
    <rect x="0" y="0" width="240" height="20" fill="#111111"/>
    <rect x="0" y="140" width="170" height="20" fill="#111111"/>
    <rect x="0" y="280" width="100" height="20" fill="#111111"/>
  </g>

  <!-- Type -->
  <g transform="translate(340 335)">
    <!-- Frontier (Fraunces inspired serif) -->
    <text x="0" y="0" fill="#111111" font-family="Fraunces, serif" font-size="160" font-weight="600" letter-spacing="-0.04em">Frontier</text>
    
    <!-- Intelligence Capital (Inter inspired sans) -->
    <text x="680" y="0" fill="#111111" font-family="Inter, sans-serif" font-size="120" font-weight="400" letter-spacing="-0.02em">Intelligence Capital</text>
  </g>
</svg>
